    <!-- Converter Section -->
    <div class="converter-section">
        <div class="container">
            <div class="row justify-content-center">

                    <div class="converter-box text-center">
                        <h2 style="color:rgb(29,29,137);">Mbps to MB/s Converter</h2>
                        <p class="lead mb-4">Convert your internet speed easily</p>

                        <div class="input-group mb-4" style="max-width:400px; margin:0 auto;">
                            <input type="number" id="mbps" class="form-control form-control-lg text-center" placeholder="Enter Mbps" onkeyup="convertSpeed()">
                            <span class="input-group-text">Mbps</span>
                        </div>

                        <h3 class="mt-4">Result:</h3>
                        <h1 id="result" class="display-4 text-success fw-bold">0 MB/s</h1>

    <script src="/assett/js/bootstrap.bundle.min.js"></script>
    <script>
        function convertSpeed() {
            const mbps = parseFloat(document.getElementById('mbps').value) || 0;
            const mbs = (mbps / 8).toFixed(2);
            document.getElementById('result').textContent = mbs + " MB/s";
        }
    </script>
